spring.application.name=FinanceTrackerPlatform

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finance_tracker_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Run data.sql after Hibernate creates/updates the schema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
jwt.secret=${JWT_SECRET:changeme-use-a-strong-256bit-secret-in-production-env}
jwt.expiration-ms=86400000

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:kamikazishania@gmail.com}
spring.mail.password=${MAIL_PASSWORD:cewztwfjlmzftbnf}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# OTP Verification Configuration
otp.email.verification=${OTP_EMAIL_VERIFICATION:false}
otp.code.length=${OTP_CODE_LENGTH:6}
otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}